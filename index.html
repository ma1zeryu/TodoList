<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList 待办事项管理器</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1 class="app-title">我的待办事项</h1>
        </header>
        
        <main class="app-main">
            <section class="input-section">
                <form class="todo-form">
                    <input type="text" class="todo-input" placeholder="添加新的待办事项..." maxlength="100">
                    <button type="submit" class="add-btn">添加</button>
                </form>
            </section>
            
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="active">待完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </section>
            
            <section class="todo-section">
                <ul class="todo-list" id="todoList">
                    <!-- 待办事项将通过 JavaScript 动态生成 -->
                </ul>
            </section>
            
            <section class="stats-section">
                <div class="stats-info">
                    <span class="stats-total">总计：<span id="totalCount">0</span> 项</span>
                    <span class="stats-completed">已完成：<span id="completedCount">0</span> 项</span>
                </div>
                <button class="clear-btn" id="clearCompleted">清除已完成</button>
            </section>
        </main>
    </div>
</body>
</html>
